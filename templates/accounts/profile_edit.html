{% extends "base.html" %}
{% block title %}Edit Profile — Wanderly{% endblock %}

{% block content %}
<div class="container-narrow" style="padding-top:3rem;padding-bottom:5rem;">
  <div class="breadcrumb">
    <a href="{% url 'accounts:profile' %}">Profile</a>
    <span class="breadcrumb-sep">›</span>
    <span>Edit</span>
  </div>
  <h1 style="font-family:var(--font-display);font-size:2.2rem;font-weight:600;margin-bottom:2rem;">Edit Profile</h1>

  <div class="post-form-card">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input type="text" name="first_name" class="form-control" value="{{ user.first_name }}">
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input type="text" name="last_name" class="form-control" value="{{ user.last_name }}">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <input type="tel" name="phone_number" class="form-control" value="{{ user.phone_number }}">
      </div>
      <div class="form-group">
        <label class="form-label">Bio</label>
        <textarea name="bio" class="form-control" rows="3" placeholder="Tell us about yourself…">{{ user.bio }}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Profile Photo</label>
        {% if user.profile_photo %}
        <div style="margin-bottom:.75rem;">
          <img src="{{ user.profile_photo.url }}" style="width:64px;height:64px;border-radius:50%;object-fit:cover;">
        </div>
        {% endif %}
        <input type="file" name="profile_photo" class="form-control" accept="image/*">
      </div>
      <div style="display:flex;gap:.75rem;margin-top:1.5rem;">
        <button type="submit" class="btn btn-accent btn-pill">Save Changes</button>
        <a href="{% url 'accounts:profile' %}" class="btn btn-ghost btn-pill">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
